<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原神知识图谱 - Genshin Knowledge Graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #graph-container { width:100%; height:100%; overflow:hidden; font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:#0d1117; color:#c9d1d9; }

#graph-container { position:relative; }

/* Controls panel */
#controls {
  position:absolute; top:16px; left:16px; z-index:100;
  background:rgba(22,27,34,0.92); border:1px solid #30363d; border-radius:12px;
  padding:16px 20px; max-width:260px; max-height:80vh; overflow-y:auto;
  backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
#controls h2 { font-size:16px; margin-bottom:8px; color:#58a6ff; }
#controls .hint { font-size:11px; color:#8b949e; line-height:1.5; margin:6px 0 8px; }
#controls .search-box { margin:8px 0 10px; }
#controls .search-box input {
  width:100%; padding:8px 10px; border-radius:8px; border:1px solid #30363d;
  background:#0d1117; color:#c9d1d9; font-size:12px; outline:none;
}
#controls .search-box input:focus { border-color:#58a6ff; }
#controls .search-box small { display:block; margin-top:4px; color:#8b949e; font-size:10px; }
#controls h3 { font-size:13px; margin:10px 0 4px; color:#8b949e; }
#controls label { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; margin:2px 0; }
#controls input[type="checkbox"] { accent-color:#58a6ff; }
#controls .filter-count { color:#8b949e; font-size:11px; margin-left:auto; }
#controls .buttons { margin-top:10px; display:flex; gap:6px; }
#controls button {
  flex:1; padding:6px 10px; font-size:12px; border-radius:6px;
  background:#21262d; color:#c9d1d9; border:1px solid #30363d; cursor:pointer;
}
#controls button:hover { background:#30363d; }
#controls button.active { background:#1f6feb; border-color:#1f6feb; }
#stats { font-size:11px; color:#8b949e; margin-top:8px; }

/* Legend */
#legend {
  position:absolute; bottom:16px; left:16px; z-index:100;
  background:rgba(22,27,34,0.92); border:1px solid #30363d; border-radius:12px;
  padding:12px 16px; backdrop-filter:blur(12px); max-width:200px;
}
#legend h3 { font-size:12px; margin-bottom:6px; color:#8b949e; }
#legend .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; margin:2px 0; }
#legend .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
#legend .legend-hex { width:12px; height:12px; clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:inline-block; }

/* Detail panel */
#detail {
  position:absolute; top:16px; right:16px; z-index:100;
  background:rgba(22,27,34,0.95); border:1px solid #30363d; border-radius:12px;
  padding:16px 20px; max-width:360px; min-width:200px;
  backdrop-filter:blur(12px); box-shadow:0 8px 32px rgba(0,0,0,0.5);
  display:none; max-height:80vh; overflow-y:auto;
}
#detail h3 { font-size:15px; color:#58a6ff; margin-bottom:6px; }
#detail .detail-meta { font-size:12px; color:#8b949e; margin-bottom:4px; }
#detail .detail-content { font-size:13px; line-height:1.6; margin-top:8px; white-space:pre-wrap; }
#detail .detail-close {
  position:absolute; top:8px; right:12px; background:none;
  border:none; color:#8b949e; font-size:18px; cursor:pointer;
}
#detail .detail-close:hover { color:#fff; }
#detail .detail-tag {
  display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px;
  margin:2px 2px 2px 0;
}

/* Loading */
#loading {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:200; text-align:center;
}
#loading .spinner {
  width:40px; height:40px; border:3px solid #30363d;
  border-top-color:#58a6ff; border-radius:50%;
  animation:spin 0.8s linear infinite; margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { font-size:14px; color:#8b949e; }

@media (max-width:600px) {
  #controls { top:8px; left:8px; max-width:180px; padding:10px; font-size:11px; }
  #detail { top:8px; right:8px; max-width:280px; padding:12px; }
  #legend { display:none; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>加载知识图谱数据...</p>
</div>

<div id="graph-container">
  <div id="controls">
    <h2>🎮 原神知识图谱</h2>
    <div class="hint">默认只显示地区概览。先搜索角色名，或勾选少量类型/地区后再展开，避免一次加载过多节点。</div>
    <div class="search-box">
      <input id="search-input" type="text" placeholder="搜索角色/词条名，例如：钟离 / 圣遗物 / 枫丹">
      <small>输入关键词后仅展示匹配条目及其地区节点</small>
    </div>
    <div id="stats">节点: - | 连边: -</div>

    <h3>📂 数据类型</h3>
    <div id="type-filters"></div>

    <h3>📍 地区</h3>
    <div id="region-filters"></div>

    <div class="buttons">
      <button id="btn-all">全选</button>
      <button id="btn-none">清空</button>
      <button id="btn-physics">🔄 重新布局</button>
    </div>
  </div>

  <div id="legend"></div>

  <div id="detail">
    <button class="detail-close" id="detail-close">✕</button>
    <div id="detail-body"></div>
  </div>
</div>

<script>
// Color map matching Python
const TYPE_COLORS = {
  book: '#e74c3c',
  character_friendship: '#3498db',
  character_story: '#2980b9',
  enemy: '#e67e22',
  quest_main: '#2ecc71',
  quest_side: '#27ae60',
  artifact: '#9b59b6',
  material: '#f39c12',
  weapon: '#1abc9c',
};

const TYPE_NAMES = {
  book: '📚 书籍',
  character_friendship: '💬 角色好感',
  character_story: '📖 角色故事',
  enemy: '👹 敌人',
  quest_main: '⚔️ 主要任务',
  quest_side: '📋 支线任务',
  artifact: '💎 圣遗物',
  material: '🧪 材料',
  weapon: '🗡️ 武器',
};

let graphData = { nodes: [], edges: [] };
let network = null;
let visibleTypeFilters = new Set();
const MAX_RENDER_NODES = 220;

async function loadData() {
  try {
    const resp = await fetch('./graph_data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    graphData = await resp.json();
    document.getElementById('loading').style.display = 'none';
    init();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#f85149;">加载失败: ${e.message}<br>请确保 graph_data.json 存在</p>`;
  }
}

function init() {
  // Collect types and regions
  const types = new Set();
  const regions = new Set();
  const typeCounts = {};
  const regionCounts = {};

  graphData.nodes.forEach(n => {
    if (n.type === '_region') return;
    types.add(n.type);
    regions.add(n.region);
    typeCounts[n.type] = (typeCounts[n.type] || 0) + 1;
    regionCounts[n.region] = (regionCounts[n.region] || 0) + 1;
  });

  // Populate type filters
  const typeDiv = document.getElementById('type-filters');
  const sortedTypes = [...types].sort((a,b) => (typeCounts[b]||0) - (typeCounts[a]||0));
  sortedTypes.forEach(t => {
    const count = typeCounts[t] || 0;
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = false;
    cb.dataset.type = t;
    cb.addEventListener('change', applyFilters);
    const dot = document.createElement('span');
    dot.className = 'legend-dot';
    dot.style.background = TYPE_COLORS[t] || '#999';
    label.appendChild(cb);
    label.appendChild(dot);
    label.appendChild(document.createTextNode(`${TYPE_NAMES[t]||t}`));
    const countSpan = document.createElement('span');
    countSpan.className = 'filter-count';
    countSpan.textContent = count;
    label.appendChild(countSpan);
    typeDiv.appendChild(label);
    visibleTypeFilters.add(t);
  });

  // Populate region filters
  const regionDiv = document.getElementById('region-filters');
  const REGION_NAMES = {
    '未分类': '🌐 未分类',
    '蒙德': '🏰 蒙德', '璃月': '🏯 璃月', '稻妻': '⛩️ 稻妻',
    '须弥': '🏜️ 须弥', '枫丹': '🏛️ 枫丹', '纳塔': '🌋 纳塔',
    '挪德卡莱': '❄️ 挪德卡莱', '渊下宫': '🌊 渊下宫',
    '至冬': '❄️ 至冬', '坎瑞亚': '💀 坎瑞亚',
    '通用': '🌍 通用', '提瓦特': '🌏 提瓦特',
  };
  const sortedRegions = [...regions].sort((a,b) => (regionCounts[b]||0) - (regionCounts[a]||0));
  sortedRegions.forEach(r => {
    const count = regionCounts[r] || 0;
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = true;
    cb.dataset.region = r;
    cb.addEventListener('change', applyFilters);
    label.appendChild(cb);
    label.appendChild(document.createTextNode(` ${REGION_NAMES[r]||r}`));
    const countSpan = document.createElement('span');
    countSpan.className = 'filter-count';
    countSpan.textContent = count;
    label.appendChild(countSpan);
    regionDiv.appendChild(label);
  });

  // Build legend
  const legendHTML = ['<h3>图例</h3>'];
  sortedTypes.forEach(t => {
    const color = TYPE_COLORS[t] || '#999';
    legendHTML.push(
      `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${TYPE_NAMES[t]||t}</div>`
    );
  });
  legendHTML.push('<div class="legend-item" style="margin-top:4px;border-top:1px solid #30363d;padding-top:4px;">');
  legendHTML.push('<span class="legend-hex" style="background:#888"></span> 地区节点</div>');
  document.getElementById('legend').innerHTML = legendHTML.join('');

  // Search input
  document.getElementById('search-input').addEventListener('input', applyFilters);

  // Button handlers
  document.getElementById('btn-all').addEventListener('click', () => {
    document.querySelectorAll('#type-filters input, #region-filters input').forEach(cb => cb.checked = true);
    visibleTypeFilters.clear();
    types.forEach(t => visibleTypeFilters.add(t));
    applyFilters();
  });
  document.getElementById('btn-none').addEventListener('click', () => {
    document.querySelectorAll('#type-filters input').forEach(cb => cb.checked = false);
    visibleTypeFilters.clear();
    applyFilters();
  });
  document.getElementById('btn-physics').addEventListener('click', () => {
    if (network) {
      network.setOptions({ physics: { enabled: true } });
      setTimeout(() => network.setOptions({ physics: { enabled: false } }), 3000);
    }
  });
  document.getElementById('detail-close').addEventListener('click', () => {
    document.getElementById('detail').style.display = 'none';
  });

  // Initial render
  applyFilters();
}

function applyFilters() {
  // Collect active type filters
  visibleTypeFilters.clear();
  document.querySelectorAll('#type-filters input:checked').forEach(cb => {
    visibleTypeFilters.add(cb.dataset.type);
  });

  // Collect active region filters
  const activeRegions = new Set();
  document.querySelectorAll('#region-filters input:checked').forEach(cb => {
    activeRegions.add(cb.dataset.region);
  });

  const searchTerm = document.getElementById('search-input').value.trim().toLowerCase();

  // Filter nodes
  const visibleNodes = [];
  const visibleNodeIds = new Set();
  const matchedContentNodes = [];

  graphData.nodes.forEach(n => {
    if (n.type === '_region') return;

    const typeOk = visibleTypeFilters.size === 0 ? false : visibleTypeFilters.has(n.type);
    const regionOk = activeRegions.has(n.region);
    const searchOk = !searchTerm || [n.label, n.region, n.type, n.category, n.element, n.weapon_type, n.material_type]
      .filter(Boolean)
      .join(' ')
      .toLowerCase()
      .includes(searchTerm);

    if ((typeOk && regionOk && searchOk) || (!visibleTypeFilters.size && searchOk && searchTerm)) {
      matchedContentNodes.push(n);
    }
  });

  matchedContentNodes.sort((a, b) => (b.size || 0) - (a.size || 0) || a.label.localeCompare(b.label, 'zh-CN'));
  const limitedContentNodes = matchedContentNodes.slice(0, MAX_RENDER_NODES);
  const involvedRegions = new Set(limitedContentNodes.map(n => n.region));

  graphData.nodes.forEach(n => {
    if (n.type === '_region' && (involvedRegions.has(n.region) || (!limitedContentNodes.length && activeRegions.has(n.region)))) {
      visibleNodes.push(n);
      visibleNodeIds.add(n.id);
    }
  });

  limitedContentNodes.forEach(n => {
    visibleNodes.push(n);
    visibleNodeIds.add(n.id);
  });

  // Filter edges (both endpoints must be visible)
  const visibleEdges = graphData.edges.filter(e =>
    visibleNodeIds.has(e.from) && visibleNodeIds.has(e.to)
  );

  const truncated = matchedContentNodes.length > limitedContentNodes.length;
  const mode = !visibleTypeFilters.size && !searchTerm ? '地区概览' : (searchTerm ? `搜索：${searchTerm}` : '筛选浏览');

  // Update stats
  document.getElementById('stats').textContent =
    `模式: ${mode} | 节点: ${visibleNodes.length} | 连边: ${visibleEdges.length}${truncated ? ` | 已截断至前 ${MAX_RENDER_NODES} 条` : ''}`;

  // Render
  renderGraph(visibleNodes, visibleEdges);
}

function renderGraph(nodes, edges) {
  const container = document.getElementById('graph-container');

  // Convert to vis.js format
  const visNodes = new vis.DataSet(nodes.map(n => ({
    id: n.id,
    label: n.label,
    color: {
      background: n.color,
      border: n.type === '_region' ? '#fff' : (n.borderWidth > 1 ? '#fff' : '#444'),
    },
    shape: n.shape || 'dot',
    size: n.size || 15,
    borderWidth: n.borderWidth || 1,
    font: n.font || { color: '#c9d1d9', size: n.type === '_region' ? 14 : 10, strokeWidth: 0 },
    title: n.label,
  })));

  const visEdges = new vis.DataSet(edges.map(e => ({
    from: e.from,
    to: e.to,
    color: e.color || { color: '#888' },
    width: e.width || 1,
    dashes: e.dashes || false,
    label: e.label || '',
    font: { color: '#8b949e', size: 8, strokeWidth: 0 },
    smooth: { type: 'continuous' },
  })));

  const options = {
    nodes: {
      font: { color: '#c9d1d9', face: 'PingFang SC, Microsoft YaHei, sans-serif' },
      scaling: { min: 8, max: 50 },
    },
    edges: {
      smooth: { type: 'continuous' },
      color: { inherit: false, opacity: 0.5 },
    },
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -40,
        centralGravity: 0.005,
        springLength: 180,
        springConstant: 0.02,
        damping: 0.4,
        avoidOverlap: 0.5,
      },
      stabilization: { iterations: 200 },
    },
    interaction: {
      hover: true,
      tooltipDelay: 200,
      zoomView: true,
      dragView: true,
      dragNodes: true,
      navigationButtons: false,
      keyboard: true,
    },
    layout: {
      improvedLayout: true,
    },
  };

  if (network) {
    network.destroy();
  }

  network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);

  // Stabilize then stop physics
  network.once('stabilized', () => {
    network.setOptions({ physics: { enabled: false } });
  });

  // Click handler for details
  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      showDetail(nodeId);
      return;
    }
    // Clicked empty space, hide detail if it was showing
    // Don't hide on empty click to avoid accidental dismiss
  });

  // Double-click to zoom
  network.on('doubleClick', function(params) {
    if (params.nodes.length > 0) {
      network.focus(params.nodes[0], { scale: 1.5, animation: true });
    }
  });
}

function showDetail(nodeId) {
  const node = graphData.nodes.find(n => n.id === nodeId);
  if (!node) return;

  const detail = document.getElementById('detail');
  const body = document.getElementById('detail-body');

  let html = `<h3>${node.label}</h3>`;

  if (node.type === '_region') {
    html += `<div class="detail-meta">📍 地区节点</div>`;
    html += `<div class="detail-content">${node.content_preview || `该地区包含多个知识条目`}</div>`;
  } else {
    html += `<div class="detail-meta">类型: ${
      TYPE_NAMES[node.type] || node.type
    }</div>`;
    html += `<div class="detail-meta">地区: ${node.region || '无'}</div>`;

    if (node.element) {
      const elemColors = {水:'#3498db',火:'#e74c3c',草:'#27ae60',雷:'#9b59b6',风:'#1abc9c',岩:'#f39c12',冰:'#85c1e9'};
      const ec = elemColors[node.element] || '#888';
      html += `<span class="detail-tag" style="background:${ec}44;color:${ec};border:1px solid ${ec}">${node.element}</span>`;
    }
    if (node.category) {
      html += `<span class="detail-tag" style="background:#f39c1244;color:#f39c12;border:1px solid #f39c12">${node.category}</span>`;
    }
    if (node.rarity) {
      html += `<span class="detail-tag" style="background:#e74c3c44;color:#e74c3c;border:1px solid #e74c3c">${node.rarity}</span>`;
    }
    if (node.weapon_type) {
      html += `<span class="detail-tag" style="background:#1abc9c44;color:#1abc9c;border:1px solid #1abc9c">${node.weapon_type}</span>`;
    }
    if (node.material_type) {
      html += `<span class="detail-tag" style="background:#9b59b644;color:#9b59b6;border:1px solid #9b59b6">${node.material_type}</span>`;
    }

    if (node.content_preview) {
      html += `<div class="detail-content">${node.content_preview}...</div>`;
    }
  }

  body.innerHTML = html;
  detail.style.display = 'block';
}

// Start
loadData();
</script>
</body>
</html>
